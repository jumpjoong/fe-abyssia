name: Frontend CI/CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mining-fe:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_REOWN_ID=${{ secrets.NEXT_PUBLIC_REOWN_ID }}

      - name: EC2 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.FRONT_EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.FRONT_EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mining-fe:latest
            docker stop mining-fe || true
            docker rm mining-fe || true
            docker run -d \
              --name mining-fe \
              --restart always \
              -p 3000:3000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/mining-fe:latest
